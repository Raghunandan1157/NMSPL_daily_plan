<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMSPL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f8;
            color: #333;
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 240px;
            background: #fff;
            border-right: 1px solid #e8eaf0;
            padding: 24px 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            color: #4a5fc1;
            padding: 0 24px 24px;
            border-bottom: 1px solid #e8eaf0;
            margin-bottom: 12px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            padding: 14px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #888;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav li:hover {
            background: #f5f7ff;
            color: #4a5fc1;
        }

        .sidebar-nav li.active {
            background: #f0f3ff;
            color: #4a5fc1;
            font-weight: 600;
            border-left-color: #4a5fc1;
        }

        .sidebar-nav li .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
        }

        .sidebar-nav li.active .dot {
            background: #4a5fc1;
        }

        .sidebar-nav li:hover .dot {
            background: #4a5fc1;
        }

        /* --- Main Content --- */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 32px 40px;
        }

        .page-header {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 28px;
        }

        /* --- Cards --- */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(74, 95, 193, 0.07);
            max-width: 640px;
        }

        .card-badge {
            display: inline-block;
            background: #eef1ff;
            color: #4a5fc1;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-group:last-child {
            margin-bottom: 0;
        }

        .field-label {
            font-size: 15px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .field-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #dde0ea;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            background: #fafbff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field-input:focus {
            border-color: #4a5fc1;
            box-shadow: 0 0 0 3px rgba(74, 95, 193, 0.12);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main {
                margin-left: 0;
                padding: 20px 16px;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">NMSPL</div>
            <ul class="sidebar-nav" id="sidebarNav">
                <li class="active" data-target="regular"><span class="dot"></span>Regular</li>
                <li data-target="1-30-dpd"><span class="dot"></span>1-30 DPD</li>
                <li data-target="31-60-dpd"><span class="dot"></span>31-60 DPD</li>
                <li data-target="61-90-dpd"><span class="dot"></span>61-90 DPD</li>
                <li data-target="npa"><span class="dot"></span>NPA</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="page-header">Portfolio Overview</div>

            <!-- Regular -->
            <div class="card" id="regular">
                <span class="card-badge">REGULAR</span>
                <div class="field-group">
                    <div class="field-label">Account</div>
                    <input type="text" class="field-input" placeholder="Enter account">
                </div>
                <div class="field-group">
                    <div class="field-label">Amount</div>
                    <input type="text" class="field-input" placeholder="Enter amount">
                </div>
            </div>

            <!-- 1-30 DPD -->
            <div class="card" id="1-30-dpd">
                <span class="card-badge">1-30 DPD</span>
                <div class="field-group">
                    <div class="field-label">Account</div>
                    <input type="text" class="field-input" placeholder="Enter account">
                </div>
                <div class="field-group">
                    <div class="field-label">Amount</div>
                    <input type="text" class="field-input" placeholder="Enter amount">
                </div>
            </div>

            <!-- 31-60 DPD -->
            <div class="card" id="31-60-dpd">
                <span class="card-badge">31-60 DPD</span>
                <div class="field-group">
                    <div class="field-label">Account</div>
                    <input type="text" class="field-input" placeholder="Enter account">
                </div>
                <div class="field-group">
                    <div class="field-label">Amount</div>
                    <input type="text" class="field-input" placeholder="Enter amount">
                </div>
            </div>

            <!-- 61-90 DPD -->
            <div class="card" id="61-90-dpd">
                <span class="card-badge">61-90 DPD</span>
                <div class="field-group">
                    <div class="field-label">Account</div>
                    <input type="text" class="field-input" placeholder="Enter account">
                </div>
                <div class="field-group">
                    <div class="field-label">Amount</div>
                    <input type="text" class="field-input" placeholder="Enter amount">
                </div>
            </div>

            <!-- NPA -->
            <div class="card" id="npa">
                <span class="card-badge">NPA</span>
                <div class="field-group">
                    <div class="field-label">Account</div>
                    <input type="text" class="field-input" placeholder="Enter account">
                </div>
                <div class="field-group">
                    <div class="field-label">Amount</div>
                    <input type="text" class="field-input" placeholder="Enter amount">
                </div>
            </div>
        </main>
    </div>

    <script>
        // Sidebar navigation - highlight active item & scroll to card
        document.querySelectorAll('#sidebarNav li').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#sidebarNav li').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const target = document.getElementById(item.dataset.target);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
</body>
</html>
